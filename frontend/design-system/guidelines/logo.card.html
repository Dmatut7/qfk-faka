<!-- @dsCard group="Brand" viewport="700x200" name="Logo · 秒卡 MiaoKa" subtitle="卡片 + 闪电标记,蓝底与白底两种用法" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:0;font-family:var(--font-sans);display:flex;}
  .panel{flex:1;display:flex;align-items:center;gap:14px;padding:32px;}
  .light{background:#fff;}
  .dark{background:var(--slate-900);}
  .wm{display:flex;flex-direction:column;line-height:1;}
  .name{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .tag{font-size:11px;font-weight:600;letter-spacing:.02em;margin-top:5px;}
</style></head>
<body>
<div class="panel light">
  <img src="../assets/logo-mark.svg" width="46" height="46" alt="秒卡" />
  <div class="wm"><span class="name" style="color:var(--slate-900)">秒卡</span><span class="tag" style="color:var(--text-muted)">虚拟商品 · 自动发货</span></div>
</div>
<div class="panel dark">
  <img src="../assets/logo-mark-light.svg" width="46" height="46" alt="秒卡" />
  <div class="wm"><span class="name" style="color:#fff">秒卡</span><span class="tag" style="color:var(--slate-400)">MiaoKa · Instant Delivery</span></div>
</div>
</body></html>
