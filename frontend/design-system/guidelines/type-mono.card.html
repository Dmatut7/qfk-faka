<!-- @dsCard group="Type" viewport="700x190" name="等宽与金额 · Mono & Money" subtitle="JetBrains Mono 用于卡密/订单号,金额用表格数字" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);}
  .grid{display:flex;gap:16px;flex-wrap:wrap;}
  .box{flex:1;min-width:200px;border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;}
  .lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:8px;}
  .mono{font-family:var(--font-mono);font-size:16px;color:var(--text-strong);letter-spacing:.02em;}
  .ord{font-family:var(--font-mono);font-size:14px;color:var(--text-muted);}
</style></head>
<body>
<div class="grid">
  <div class="box">
    <div class="lab">卡密 Card Key</div>
    <div class="mono">NFLX-7K2M-9QZP-44XB</div>
    <div class="ord" style="margin-top:10px">订单号 #MK20260621A8F3</div>
  </div>
  <div class="box">
    <div class="lab">金额 Money</div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <span class="ds-money" style="font-size:36px;color:var(--price-accent)"><span class="ds-money__symbol">¥</span>29.90</span>
      <span style="text-decoration:line-through;color:var(--text-subtle);font-weight:600">¥49.00</span>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:8px">表格数字对齐 · tabular-nums</div>
  </div>
</div>
</body></html>
