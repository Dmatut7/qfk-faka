<!-- @dsCard group="Colors" viewport="700x150" name="主色 · 淘宝橙" subtitle="品牌橙,从浅到深的阶梯;主操作与选中态" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{flex:1;min-width:72px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);}
  .chip{height:56px;}
  .meta{padding:7px 9px;}
  .nm{font-size:12px;font-weight:700;color:var(--text-strong);}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;}
  .star{position:absolute;margin:6px 0 0 6px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.25);padding:1px 6px;border-radius:99px;}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--orange-50)"></div><div class="meta"><div class="nm">50</div><div class="hex">#FFF3EC</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-100)"></div><div class="meta"><div class="nm">100</div><div class="hex">#FFE3D1</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-300)"></div><div class="meta"><div class="nm">300</div><div class="hex">#FFA877</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-500);position:relative"><span class="star">brand</span></div><div class="meta"><div class="nm">500</div><div class="hex">#FF5000</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-600)"></div><div class="meta"><div class="nm">600 hover</div><div class="hex">#E64600</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-700)"></div><div class="meta"><div class="nm">700 active</div><div class="hex">#C23A00</div></div></div>
</div>
</body></html>
