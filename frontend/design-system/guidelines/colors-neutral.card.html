<!-- @dsCard group="Colors" viewport="700x150" name="中性灰 · Slate" subtitle="冷调灰阶,承载文字、边框与背景" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .sw{flex:1;min-width:60px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);}
  .chip{height:52px;}
  .meta{padding:6px 8px;}
  .nm{font-size:11px;font-weight:700;color:var(--text-strong);}
  .hex{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="meta"><div class="nm">50</div><div class="hex">F6F8FB</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="meta"><div class="nm">100</div><div class="hex">EDF1F7</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="meta"><div class="nm">200</div><div class="hex">DCE3ED</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="meta"><div class="nm">300</div><div class="hex">C3CEDC</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="meta"><div class="nm">400</div><div class="hex">94A3B8</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="meta"><div class="nm">500</div><div class="hex">64748B</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="meta"><div class="nm">700</div><div class="hex">354155</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="meta"><div class="nm">900</div><div class="hex">121B2A</div></div></div>
</div>
</body></html>
