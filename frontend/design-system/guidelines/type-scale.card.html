<!-- @dsCard group="Type" viewport="700x300" name="字阶 · Type Scale" subtitle="Manrope + 思源黑体,展示标题到正文" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:var(--text-strong);}
  .r{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px dashed var(--border);}
  .r:last-child{border:none;}
  .t{font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);width:104px;flex:none;}
</style></head>
<body>
  <div class="r"><span class="t">display · 800</span><span style="font-size:var(--text-display);font-weight:800;letter-spacing:-.02em;line-height:1.1">秒卡 · 即时到账</span></div>
  <div class="r"><span class="t">2xl · 700</span><span style="font-size:var(--text-2xl);font-weight:700;letter-spacing:-.01em">商品详情与下单</span></div>
  <div class="r"><span class="t">xl · 700</span><span style="font-size:var(--text-xl);font-weight:700">Netflix 高级会员</span></div>
  <div class="r"><span class="t">lg · 600</span><span style="font-size:var(--text-lg);font-weight:600">填写接收邮箱</span></div>
  <div class="r"><span class="t">base · 400</span><span style="font-size:var(--text-base);color:var(--text-body)">付款后卡密将自动发送到邮箱,通常 5 秒内到账。</span></div>
  <div class="r"><span class="t">sm · 500</span><span style="font-size:var(--text-sm);font-weight:500;color:var(--text-muted)">已售 2,304 · 库存充足</span></div>
  <div class="r"><span class="t">xs · 700</span><span style="font-size:var(--text-xs);font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-subtle)">SECURE CHECKOUT</span></div>
</body></html>
