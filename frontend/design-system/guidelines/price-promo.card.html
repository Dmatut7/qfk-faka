<!-- @dsCard group="Colors" viewport="700x180" name="价格 · 促销 · CTA 渐变" subtitle="红价格、超级立减、政府补贴绿、立即购买/加购渐变" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .price{color:var(--price-accent);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .price .s{font-size:.6em;font-weight:700;}.price .d{font-size:.66em;}
  .orig{color:var(--text-subtle);text-decoration:line-through;font-size:14px;}
  .promo{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:4px;background:var(--promo-solid);color:#fff;font-size:12px;font-weight:800;}
  .subsidy{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:4px;background:var(--subsidy-bg);color:var(--subsidy-fg);font-size:12px;font-weight:700;}
  .promoline{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:4px;border:1px solid var(--promo-soft-border);color:var(--promo-soft-fg);font-size:12px;font-weight:700;}
  .cta{height:42px;padding:0 24px;border:none;border-radius:999px;color:#fff;font-weight:800;font-size:15px;display:inline-flex;align-items:center;}
  .lbl{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <span class="price" style="font-size:30px"><span class="s">¥</span>29<span class="d">.90</span></span>
  <span class="orig">¥49.00</span>
  <span class="promo">超级立减</span>
  <span class="subsidy">政府补贴</span>
  <span class="promoline">立减20%</span>
  <span class="lbl">--price-accent #FA2C19</span>
</div>
<div class="row">
  <button class="cta" style="background:var(--cta-gradient-buy)">立即购买</button>
  <button class="cta" style="background:var(--cta-gradient-cart)">加入购物车</button>
  <span class="lbl">--cta-gradient-buy · --cta-gradient-cart</span>
</div>
</body></html>
